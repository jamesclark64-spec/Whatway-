<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0d;--bg-card:#191815;--bg-card-h:#1f1e1b;--bg-el:#222018;--text:#ece7dc;--muted:#8a8478;--faint:#4e4a44;--accent:#d4933a;--accent-l:#e8b56a;--accent-d:rgba(212,147,58,.14);--green:#6b9e72;--green-d:rgba(107,158,114,.13);--blue-d:rgba(90,120,165,.15);--blue:#7090c0;--red-d:rgba(190,70,60,.14);--red:#e07060;--border:#27251f;--border-l:#1c1b17;--r:12px;--rs:8px;--fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#app{max-width:920px;margin:0 auto;padding:0 16px 60px}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0 18px;border-bottom:1px solid var(--border);margin-bottom:28px;position:sticky;top:0;background:var(--bg);z-index:50}
.logo{font-family:var(--fd);font-size:20px;font-weight:600;letter-spacing:-.2px;cursor:pointer}.logo em{color:var(--accent);font-style:normal}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rs);font-family:var(--fb);font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .18s ease;text-decoration:none;white-space:nowrap;line-height:1}
.btn-p{background:var(--accent);color:#1a1208}.btn-p:hover{background:var(--accent-l);transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-g:hover{color:var(--text);background:var(--bg-el);border-color:var(--faint)}
.btn-d{background:var(--red-d);color:var(--red);border:1px solid rgba(190,70,60,.2)}.btn-d:hover{background:rgba(190,70,60,.22)}
.btn-sm{padding:6px 13px;font-size:12.5px}
.btn-ico{width:34px;height:34px;padding:0;justify-content:center;border-radius:7px}
/* SEARCH & FILTER */
.search-row{display:flex;gap:10px;margin-bottom:14px}
.sw{flex:1;position:relative}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;pointer-events:none}
input.search{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13.5px;padding:9px 12px 9px 34px;outline:none;transition:border-color .18s}
input.search:focus{border-color:var(--accent)}input.search::placeholder{color:var(--faint)}
select.sort{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:var(--fb);font-size:13px;padding:9px 12px;outline:none;cursor:pointer}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .14s;font-family:var(--fb)}
.chip:hover{color:var(--text);border-color:var(--faint)}
.chip.on{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
/* CARDS */
.count{font-size:12.5px;color:var(--faint);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:15px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity .2s}
.card:hover{background:var(--bg-card-h);border-color:#302e29;transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.card:hover::before{opacity:1}
.card-head{display:flex;align-items:flex-start;gap:13px;margin-bottom:11px}
.card-emj{font-size:28px;width:46px;height:46px;background:var(--bg-el);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.card-tw{flex:1;min-width:0}
.card-title{font-family:var(--fd);font-size:16.5px;font-weight:600;line-height:1.25;margin-bottom:3px}
.card-desc{font-size:12.5px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cal-badge{font-size:12.5px;font-weight:600;padding:5px 9px;border-radius:6px;white-space:nowrap;flex-shrink:0;align-self:flex-start;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.2}
.cal-badge span{font-size:9.5px;font-weight:400;opacity:.75;letter-spacing:.2px}
.cal-lo{background:var(--green-d);color:var(--green)}.cal-mid{background:var(--accent-d);color:var(--accent)}.cal-hi{background:var(--red-d);color:var(--red)}
.cal-badge{display:flex;flex-direction:column;align-items:center;text-align:center}.cal-badge span{font-size:9px;font-weight:400;opacity:.65;text-transform:uppercase;letter-spacing:.4px;margin-top:1px;display:block}
.card-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--faint);margin-bottom:10px}
.mi{display:flex;align-items:center;gap:3px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;background:var(--green-d);color:var(--green)}
.tag-s{background:var(--blue-d);color:var(--blue)}
.tag-so{background:rgba(160,120,200,.13);color:#b090e0}
/* DETAIL */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:22px;background:none;border:none;font-family:var(--fb);padding:0;transition:color .15s}
.back:hover{color:var(--text)}
.dh{display:flex;align-items:flex-start;gap:18px;margin-bottom:20px}
.d-emj{font-size:48px;width:72px;height:72px;background:var(--bg-el);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.d-ta{flex:1;padding-top:2px}
.d-title{font-family:var(--fd);font-size:28px;font-weight:700;line-height:1.2;margin-bottom:6px;letter-spacing:-.2px}
.d-desc{color:var(--muted);font-size:13.5px;line-height:1.6;margin-bottom:10px}
.d-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--muted);margin-bottom:10px}
.d-mi{display:flex;align-items:center;gap:4px}.d-mi strong{color:var(--text)}
.d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.d-acts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
/* NUT STRIP */
.nstrip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:26px;border:1px solid var(--border)}
.nsc{background:var(--bg-card);padding:14px 16px;text-align:center}
.nsc-l{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.nsc-cal{font-family:var(--fd);font-size:24px;font-weight:600;line-height:1;margin-bottom:3px}
.nsc-cal sub{font-size:12px;font-weight:400;color:var(--muted);font-family:var(--fb)}
.nsc-m{font-size:11px;color:var(--faint);display:flex;justify-content:center;gap:7px}
.mp{color:var(--green)}.mc{color:var(--accent)}.mf{color:var(--blue)}
.nsc-tot{background:var(--bg-el)}
@media(max-width:580px){.nstrip{grid-template-columns:1fr 1fr}.nsc-tot{grid-column:1/-1}}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:26px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:var(--fb);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .14s}
.tab:hover{color:var(--text)}.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tp{display:none}.tp.on{display:block}
/* INGREDIENTS */
.sec-title{font-family:var(--fd);font-size:14.5px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
ul.ings{list-style:none;margin-bottom:22px}
.ir{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-l);gap:10px;font-size:13.5px}
.ir:last-child{border-bottom:none}
.iamt{font-weight:600;color:var(--accent);min-width:56px;text-align:right;font-size:12.5px;flex-shrink:0}
.iunit{color:var(--muted);font-size:11.5px;min-width:28px;flex-shrink:0}
.iname{flex:1;color:var(--text)}
.inote{color:var(--faint);font-size:11.5px;font-style:italic}
/* METHOD */
.steps{list-style:none}
.step{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.sn{width:28px;height:28px;border-radius:50%;background:var(--accent-d);border:1px solid rgba(212,147,58,.3);color:var(--accent);font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.st{flex:1;color:var(--muted);line-height:1.75;font-size:14px}
/* NUT DETAIL */
.nt{margin-bottom:24px;background:var(--bg-card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.nth{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
table.ntab{width:100%;border-collapse:collapse}
.ntab th{padding:9px 16px;text-align:right;font-size:11px;font-weight:500;color:var(--faint);letter-spacing:.3px}
.ntab th:first-child{text-align:left}
.ntab td{padding:9px 16px;text-align:right;font-size:13.5px;border-top:1px solid var(--border-l);color:var(--muted)}
.ntab td:first-child{text-align:left;color:var(--text)}
.ntab tr.hl td{font-weight:600;color:var(--text)}.ntab tr.hl td:first-child{color:var(--accent)}
/* NOTES */
.notes-box{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r);padding:16px 18px;color:var(--muted);font-size:13.5px;line-height:1.8}
/* FORM */
.form-wrap{padding-bottom:40px}
.f-title{font-family:var(--fd);font-size:24px;font-weight:700;margin-bottom:22px}
.fs{margin-bottom:26px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.fsh{padding:14px 18px;background:var(--bg-el);border-bottom:1px solid var(--border);font-family:var(--fd);font-size:15px;font-weight:600}
.fb{padding:18px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.f2{grid-template-columns:1fr}}
.fg{margin-bottom:14px}.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-bottom:5px}
input.fi,select.fi,textarea.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:13.5px;padding:9px 13px;outline:none;transition:border-color .14s}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--accent)}
input.fi::placeholder,textarea.fi::placeholder{color:var(--faint)}
textarea.fi{resize:vertical;min-height:72px;line-height:1.6}
/* REPEATER */
.rep{display:flex;flex-direction:column;gap:7px}
.rr{display:flex;gap:7px;align-items:center}
.rr .fi{flex:1}
.rr .amt{max-width:76px}.rr .unt{max-width:76px}
.rmv{width:28px;height:28px;flex-shrink:0;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--faint);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.rmv:hover{background:var(--red-d);color:var(--red);border-color:rgba(190,70,60,.3)}
.add-row{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--accent);background:transparent;border:1px dashed rgba(212,147,58,.28);border-radius:var(--rs);padding:8px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:var(--fb);width:100%;transition:all .14s;margin-top:3px}
.add-row:hover{background:var(--accent-d);border-color:var(--accent)}
/* STEP REP */
.srep{display:flex;flex-direction:column;gap:9px}
.srr{display:flex;gap:9px;align-items:flex-start}
.snbadge{width:26px;height:26px;border-radius:50%;background:var(--bg-el);border:1px solid var(--border);color:var(--faint);font-size:11.5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:8px}
/* NUT FORM */
.nfg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:460px){.nfg{grid-template-columns:repeat(2,1fr)}}
/* SIDE TOGGLE */
.side-tog{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:16px;user-select:none;padding:12px 18px;background:var(--bg-el);border-radius:var(--rs)}
.tog{width:34px;height:19px;background:var(--border);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.tog::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:var(--faint);top:3px;left:3px;transition:all .2s}
.tog.on{background:var(--accent)}.tog.on::after{left:18px;background:white}
/* COOKING MODE */
#cook-overlay{position:fixed;inset:0;background:#09080700;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;transition:background .3s;pointer-events:none}
#cook-overlay.vis{background:#090807f5;pointer-events:all}
.cook-inner{opacity:0;transform:translateY(12px);transition:all .3s .1s}
.cook-inner.vis{opacity:1;transform:translateY(0)}
.cook-close{position:absolute;top:22px;right:22px;background:var(--bg-el);border:1px solid var(--border);color:var(--muted);padding:7px 15px;border-radius:7px;cursor:pointer;font-family:var(--fb);font-size:12.5px}
.cook-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:18px}
.cook-text{font-family:var(--fd);font-size:clamp(17px,3vw,26px);font-weight:400;color:var(--text);line-height:1.7;max-width:520px;margin-bottom:38px}
.cook-ctrl{display:flex;gap:12px;align-items:center}
.cook-prog{font-size:12.5px;color:var(--faint);margin-top:28px;letter-spacing:.3px}
/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--bg-el);border:1px solid var(--border);border-radius:var(--r);padding:26px;max-width:340px;width:100%;animation:fadeUp .2s ease}
.modal-title{font-family:var(--fd);font-size:17px;font-weight:600;margin-bottom:8px}
.modal-text{color:var(--muted);font-size:13.5px;margin-bottom:22px;line-height:1.6}
.modal-acts{display:flex;gap:9px;justify-content:flex-end}
/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--faint)}
.empty-ico{font-size:44px;margin-bottom:14px}
.dinner-btn{width:100%;padding:18px 24px;border-radius:var(--r);border:2px dashed rgba(212,147,58,.35);background:linear-gradient(135deg,rgba(212,147,58,.08),rgba(212,147,58,.04));color:var(--accent);font-family:var(--fd);font-size:20px;font-weight:600;cursor:pointer;transition:all .22s ease;letter-spacing:-.2px;position:relative;overflow:hidden;margin-bottom:22px;text-align:center}
.dinner-btn:hover{background:linear-gradient(135deg,rgba(212,147,58,.16),rgba(212,147,58,.08));border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,147,58,.15)}
.dinner-btn:active{transform:translateY(0)}
.dinner-btn .sub{display:block;font-family:var(--fb);font-size:12px;font-weight:400;color:var(--muted);margin-top:3px;letter-spacing:0}
/* Picker overlay */
#picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s}
#picker-overlay.vis{opacity:1;pointer-events:all}
.picker-box{background:var(--bg-el);border:1px solid var(--border);border-radius:16px;padding:32px 28px;max-width:420px;width:100%;text-align:center;transform:translateY(16px);transition:transform .25s .05s;position:relative}
#picker-overlay.vis .picker-box{transform:translateY(0)}
.picker-emj{font-size:56px;margin-bottom:12px;display:block;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.picker-title{font-family:var(--fd);font-size:24px;font-weight:700;margin-bottom:6px;line-height:1.2}
.picker-desc{color:var(--muted);font-size:13.5px;line-height:1.6;margin-bottom:18px}
.picker-cal{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:22px}
.picker-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:24px}
.picker-acts{display:flex;gap:9px;justify-content:center}
.picker-close{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--faint);font-size:20px;cursor:pointer;line-height:1;padding:4px}
.picker-close:hover{color:var(--text)}
.empty-t{font-family:var(--fd);font-size:18px;color:var(--muted);margin-bottom:6px}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease both}
.grid .card{animation:fadeUp .3s ease both}
.grid .card:nth-child(1){animation-delay:.02s}.grid .card:nth-child(2){animation-delay:.06s}.grid .card:nth-child(3){animation-delay:.1s}.grid .card:nth-child(4){animation-delay:.14s}.grid .card:nth-child(5){animation-delay:.18s}.grid .card:nth-child(6){animation-delay:.22s}.grid .card:nth-child(7){animation-delay:.26s}.grid .card:nth-child(8){animation-delay:.3s}.grid .card:nth-child(9){animation-delay:.34s}.grid .card:nth-child(10){animation-delay:.38s}
.divider{height:1px;background:var(--border);margin:20px 0}
@media(max-width:580px){.dh{gap:12px}.d-emj{width:58px;height:58px;font-size:34px}.d-title{font-size:22px}.topbar{padding:16px 0 14px;margin-bottom:20px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="cook-overlay"><button class="cook-close" onclick="stopCooking()">✕ Exit cooking mode</button><div class="cook-inner" id="cook-inner"><div class="cook-lbl" id="cook-lbl"></div><div class="cook-text" id="cook-text"></div><div class="cook-ctrl"><button class="btn btn-g" onclick="cookPrev()">← Prev</button><button class="btn btn-p" onclick="cookNext()">Next →</button></div><div class="cook-prog" id="cook-prog"></div></div></div>
<div id="modal" style="display:none"></div>
<div id="picker-overlay">
  <div class="picker-box">
    <button class="picker-close" onclick="closePicker()">×</button>
    <span class="picker-emj" id="pk-emj">🍽️</span>
    <div class="picker-title" id="pk-title"></div>
    <div class="picker-desc" id="pk-desc"></div>
    <div class="picker-cal" id="pk-cal"></div>
    <div class="picker-tags" id="pk-tags"></div>
    <div class="picker-acts">
      <button class="btn btn-g" onclick="pickAnother()">🎲 Pick another</button>
      <button class="btn btn-p" onclick="goPickedMeal()">View recipe →</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────────────
const DEFAULTS = [
{id:1,emoji:'🍗',name:'Chicken Cacciatore with Spaghetti',description:'A rustic Italian hunter\'s stew with mushrooms, olives and pancetta over wholewheat spaghetti',servings:4,prepTime:15,cookTime:40,tags:['pasta','chicken','italian'],main:{ingredients:[{amount:'4',unit:'',name:'Skinless boneless chicken thighs'},{amount:'2',unit:'tbsp',name:'Olive oil'},{amount:'125',unit:'g',name:'Oyster mushrooms'},{amount:'125',unit:'g',name:'Chestnut mushrooms'},{amount:'4',unit:'rashers',name:'Smoked pancetta'},{amount:'2–3',unit:'sprigs',name:'Fresh rosemary'},{amount:'2',unit:'',name:'Anchovy fillets'},{amount:'2',unit:'',name:'Jarred red peppers'},{amount:'handful',unit:'',name:'Black olives (stoned)'},{amount:'2',unit:'cloves',name:'Garlic'},{amount:'1',unit:'',name:'Red chilli'},{amount:'60',unit:'ml',name:'Red wine'},{amount:'700',unit:'g',name:'Passata'},{amount:'1',unit:'bunch',name:'Fresh basil'},{amount:'320',unit:'g',name:'Wholewheat spaghetti'},{amount:'30',unit:'g',name:'Parmesan'}],method:['Cut chicken into bite-sized chunks. Heat a large pan with 2 tbsp oil. Add chicken with salt & pepper and cook until starting to brown.','Add mushrooms, chopped pancetta, rosemary, anchovies, torn red peppers and olives. Cook on medium-high heat, stirring regularly until everything is golden.','Crush in the garlic. Add sliced chilli, red wine and passata. Season to taste. Simmer gently.','Boil salted water and cook spaghetti according to packet.','Tear in half the basil. Let the sauce simmer until slightly thickened.','Drain pasta, saving a little cooking water. Add pasta to the sauce or plate separately. Loosen with a splash of pasta water if needed.','Top with remaining basil and grated Parmesan.'],nutrition:{perPortion:{calories:613,protein:42,carbs:58,fat:18,fibre:8,salt:1.2},per100g:{calories:168,protein:11.5,carbs:15.9,fat:4.9,fibre:2.2,salt:0.33}}},side:null,notes:'Great batch cook meal. The sauce improves overnight. Serve with extra Parmesan at the table.',createdAt:'2026-03-01'},

{id:2,emoji:'🌶️',name:'Chilli Con Carne',description:'A hearty beef and bean chilli with a secret dark chocolate depth',servings:4,prepTime:10,cookTime:55,tags:['beef','batch cook','low calorie'],main:{ingredients:[{amount:'2',unit:'tbsp',name:'Olive oil'},{amount:'450',unit:'g',name:'Minced beef'},{amount:'1 large',unit:'',name:'Onion (finely chopped)'},{amount:'1',unit:'tsp',name:'Chilli powder'},{amount:'1',unit:'tsp',name:'Ground cumin'},{amount:'3',unit:'tbsp',name:'Tomato purée'},{amount:'300',unit:'ml',name:'Hot vegetable stock'},{amount:'400',unit:'g',name:'Tinned chopped tomatoes'},{amount:'25',unit:'g',name:'Dark chocolate'},{amount:'400',unit:'g',name:'Kidney beans (drained)'},{amount:'handful',unit:'',name:'Fresh coriander (optional)'}],method:['Heat 1 tbsp oil in a large pan. Add the minced beef and cook for ~10 minutes until browned, breaking it up as it cooks. Remove from the pan and set aside.','Add the remaining 1 tbsp oil. Fry the chopped onion for ~10 minutes until soft and slightly golden.','Stir in the chilli powder and cumin. Cook for about 1 minute to bring out the flavour.','Add the cooked beef back in, then tomato purée, hot stock and chopped tomatoes. Bring to the boil, then reduce to a gentle simmer. Cook uncovered for 35–40 minutes, stirring occasionally, until thick.','Stir in dark chocolate, kidney beans and coriander. Season with salt & pepper. Simmer for another 5 minutes.','Serve hot with rice or on its own for a lower-cal option.'],nutrition:{perPortion:{calories:420,protein:28,carbs:28,fat:22,fibre:8,salt:1.0},per100g:{calories:140,protein:9.3,carbs:9.3,fat:7.3,fibre:2.7,salt:0.33}}},side:null,notes:'Tastes better the next day. Freezes brilliantly. The chocolate doesn\'t make it sweet — just deepens the flavour. Use 5% mince to save ~300–400 kcal total.',createdAt:'2026-03-02'},

{id:3,emoji:'🍝',name:'Creamy BBQ Chicken Pasta',description:'Baked chicken with BBQ sauce and cream cheese, tossed through pasta and finished with melted cheese',servings:4,prepTime:10,cookTime:50,tags:['pasta','chicken','high protein'],main:{ingredients:[{amount:'300',unit:'g',name:'Diced chicken breast'},{amount:'1',unit:'',name:'Pepper (chopped)'},{amount:'½',unit:'',name:'Onion (chopped)'},{amount:'2',unit:'tsp',name:'Garlic'},{amount:'½ pkt',unit:'',name:'Smoky BBQ seasoning'},{amount:'½ tin',unit:'',name:'Chopped tomatoes'},{amount:'25',unit:'g',name:'BBQ sauce'},{amount:'100',unit:'g',name:'Low-fat cream cheese'},{amount:'100',unit:'g',name:'Dry pasta'},{amount:'40',unit:'g',name:'Reduced-fat grated cheese'}],method:['Preheat oven to 190°C. In a baking dish, add diced chicken, pepper, onion, garlic and BBQ seasoning. Mix well.','Add chopped tomatoes, BBQ sauce and cream cheese. Mix everything together so it\'s coated.','Cook in the oven for ~45–50 minutes, stirring once halfway through. Sauce should be thick and creamy.','Boil salted water and cook pasta according to packet. Drain.','Mix the cooked pasta into the sauce. Top with grated cheese and let it melt.','Split into 4 portions and serve.'],nutrition:{perPortion:{calories:276,protein:25,carbs:25,fat:8,fibre:3,salt:1.2},per100g:{calories:105,protein:9.5,carbs:9.5,fat:3.0,fibre:1.1,salt:0.46}}},side:null,notes:'One of the best options for fat loss — high protein, lean, controlled pasta. Add mushrooms or spinach for more volume without extra calories.',createdAt:'2026-03-03'},

{id:4,emoji:'🍛',name:'One-Pot Curried Sausage & Beans',description:'Quick and comforting curried sausages with baked beans — cheap, easy and kid-friendly',servings:4,prepTime:5,cookTime:25,tags:['sausage','quick','batch cook'],main:{ingredients:[{amount:'8',unit:'',name:'Sausages'},{amount:'1',unit:'',name:'Onion (chopped)'},{amount:'1',unit:'tbsp',name:'Oil'},{amount:'2',unit:'tsp',name:'Curry powder'},{amount:'2',unit:'tsp',name:'Turmeric'},{amount:'1',unit:'',name:'Vegetable stock cube'},{amount:'150',unit:'ml',name:'Boiling water'},{amount:'400',unit:'g',name:'Tinned baked beans'}],method:['Grill or fry the sausages until fully cooked. Cut each into bite-sized pieces (about 3–4 pieces each). Set aside.','Heat the oil in a pan on low heat. Add the onion and cook gently until soft, about 8–10 minutes.','Stir in curry powder and turmeric. Cook for 1 minute, stirring so it doesn\'t burn.','Dissolve the stock cube in the boiling water. Pour into the pan and cook for 2 minutes.','Add baked beans and chopped sausages. Stir everything together and simmer for a few minutes until hot through.','Serve as-is or with rice.'],nutrition:{perPortion:{calories:500,protein:20,carbs:35,fat:30,fibre:6,salt:2.0},per100g:{calories:175,protein:7.0,carbs:12.3,fat:10.5,fibre:2.1,salt:0.70}}},side:null,notes:'Use reduced-fat sausages to save 300–600 kcal total — calorie count swings massively by sausage choice. Add mushrooms or peppers to bulk it out.',createdAt:'2026-03-04'},

{id:5,emoji:'🍝',name:"Pregnant Jools' Pasta",description:"Jamie Oliver's quick sausage ragu with fennel and balsamic over penne — tastes like slow-cooked in 30 mins",servings:6,prepTime:15,cookTime:30,tags:['pasta','sausage','batch cook'],main:{ingredients:[{amount:'4',unit:'',name:'Spring onions'},{amount:'1',unit:'',name:'Carrot'},{amount:'1 stick',unit:'',name:'Celery'},{amount:'1–2',unit:'',name:'Red chillies'},{amount:'6',unit:'',name:'Sausages (skins off)'},{amount:'1',unit:'tsp',name:'Fennel seeds'},{amount:'1',unit:'tsp',name:'Dried oregano'},{amount:'1',unit:'tbsp',name:'Olive oil'},{amount:'500',unit:'g',name:'Penne pasta'},{amount:'4',unit:'cloves',name:'Garlic'},{amount:'4',unit:'tbsp',name:'Balsamic vinegar'},{amount:'400',unit:'g',name:'Tinned chopped tomatoes'},{amount:'handful',unit:'',name:'Parmesan (to serve)'},{amount:'handful',unit:'',name:'Fresh basil (optional)'}],method:['Roughly chop the spring onions, carrot, celery and chillies. Blitz in a food processor until finely chopped.','Add the sausages (skins off), fennel seeds and oregano. Pulse again until mixed into a rough mince.','Heat a large frying pan with olive oil. Add the mixture and cook on high heat, breaking it up and stirring until browned.','Boil salted water and cook the penne according to the packet.','Crush in the garlic, then add balsamic vinegar and chopped tomatoes. Let it simmer. Add a splash of pasta water if it gets too thick.','Drain the pasta (keep a bit of the water). Mix into the sauce, loosening with reserved water until silky.','Taste and adjust seasoning. Serve with grated Parmesan and fresh basil on top.'],nutrition:{perPortion:{calories:550,protein:24,carbs:60,fat:23,fibre:5,salt:1.4},per100g:{calories:195,protein:8.5,carbs:21.3,fat:8.2,fibre:1.8,salt:0.50}}},side:null,notes:'Fennel + balsamic gives it a punchy, slightly sweet flavour. Use low-fat sausages and go lighter on Parmesan to cut calories significantly.',createdAt:'2026-03-05'},

{id:6,emoji:'🥗',name:'Sausage Fusilli with Creamy Garden Salad',description:'Crispy sausages over a fennel and pepper tomato sauce with a creamy yoghurt-dressed garden salad',servings:4,prepTime:15,cookTime:35,tags:['pasta','sausage','with side'],main:{ingredients:[{amount:'4',unit:'',name:'Good quality sausages'},{amount:'1 tsp + 1 tbsp',unit:'',name:'Olive oil'},{amount:'1',unit:'',name:'Red onion'},{amount:'1 heaped tsp',unit:'',name:'Fennel seeds'},{amount:'4',unit:'',name:'Jarred red peppers'},{amount:'4 sprigs',unit:'',name:'Fresh rosemary'},{amount:'4',unit:'cloves',name:'Garlic'},{amount:'320',unit:'g',name:'Fusilli pasta'},{amount:'350',unit:'g',name:'Passata'},{amount:'3',unit:'tbsp',name:'Balsamic vinegar'}],method:['Slice sausages lengthways (not all the way through — open like a book). Rub with a little oil and cook in a hot pan, cut side down, until crispy and cooked through. Set aside.','In a processor (or chop finely), combine red onion, fennel seeds, red peppers, half the rosemary, salt & pepper.','Heat 1 tbsp oil in a pan. Add the blended mix and cook, stirring regularly. Crush in the garlic. Cook until softened and slightly reduced.','Boil salted water and cook fusilli according to packet.','Add passata and balsamic vinegar to the sauce. Simmer until slightly thickened.','Drain pasta (save a bit of the water). Add pasta to the sauce and mix well.','Slice sausages and place on top. Drizzle a little extra balsamic. Serve with the salad on the side.'],nutrition:{perPortion:{calories:587,protein:25,carbs:64,fat:24,fibre:6,salt:1.7},per100g:{calories:178,protein:7.6,carbs:19.4,fat:7.3,fibre:1.8,salt:0.52}}},side:{name:'Creamy Garden Salad',ingredients:[{amount:'1',unit:'',name:'Lettuce'},{amount:'100',unit:'g',name:'Spinach or rocket'},{amount:'1 punnet',unit:'',name:'Cress'},{amount:'2',unit:'tsp',name:'English mustard'},{amount:'3',unit:'tbsp',name:'Fat-free natural yoghurt'},{amount:'1',unit:'',name:'Lemon (juice)'},{amount:'1 bunch',unit:'',name:'Fresh chives'}],method:['Mix together mustard, yoghurt, lemon juice, salt & pepper.','Chop chives and stir half into the dressing.','Toss with lettuce, spinach/rocket and cress. Scatter remaining chives on top.'],nutrition:{perPortion:{calories:35,protein:3,carbs:4,fat:0.5,fibre:2,salt:0.2},per100g:{calories:25,protein:2.1,carbs:2.8,fat:0.4,fibre:1.4,salt:0.14}}},notes:'Salad adds volume with barely any calories. Use lean sausages and drop pasta to 280g to save ~150–200 kcal per portion.',createdAt:'2026-03-06'},

{id:7,emoji:'🥬',name:'Sausage Gnocchi with Warm Kale & Bean Salad',description:'Sausage and gnocchi in a rosemary red wine sauce with a warm kale, green bean and hazelnut salad',servings:4,prepTime:15,cookTime:35,tags:['gnocchi','sausage','with side'],main:{ingredients:[{amount:'4',unit:'',name:'Sausages (skins removed)'},{amount:'2',unit:'tsp',name:'Fennel seeds'},{amount:'2 sprigs',unit:'',name:'Rosemary'},{amount:'125',unit:'ml',name:'Red wine'},{amount:'700',unit:'g',name:'Passata'},{amount:'400',unit:'g',name:'Gnocchi'},{amount:'200',unit:'g',name:'Tenderstem broccoli'}],method:['Remove sausage meat from skins. Add to a large pan with fennel seeds and rosemary. Cook, breaking it up, until browned.','Pour in the red wine and let it bubble down. Add passata and simmer gently to thicken.','Add gnocchi to boiling water and cook until they float (couple of minutes). Drain.','Add gnocchi to the sausage sauce. Toss everything together.','Plate up with greens on the side. Finish with a drizzle of yoghurt.'],nutrition:{perPortion:{calories:410,protein:19,carbs:46,fat:17,fibre:5,salt:1.4},per100g:{calories:140,protein:6.5,carbs:15.7,fat:5.8,fibre:1.7,salt:0.48}}},side:{name:'Warm Kale & Bean Salad',ingredients:[{amount:'2',unit:'rashers',name:'Streaky bacon'},{amount:'1',unit:'tsp',name:'Olive oil'},{amount:'40',unit:'g',name:'Hazelnuts'},{amount:'1',unit:'tsp',name:'Honey or maple syrup'},{amount:'200',unit:'g',name:'Green beans'},{amount:'300',unit:'g',name:'Mixed greens (kale, chard)'},{amount:'1½',unit:'tbsp',name:'Olive oil (dressing)'},{amount:'1½',unit:'tbsp',name:'Sherry or red wine vinegar'},{amount:'2',unit:'tbsp',name:'Natural yoghurt'}],method:['In a frying pan, cook chopped bacon and hazelnuts in oil until golden and crispy. Add honey/maple syrup right at the end. Set aside.','Boil water. Add green beans (cook ~4 mins), then mixed greens (cook briefly until wilted). Drain well.','Mix together olive oil, vinegar, salt & pepper. Toss with the drained greens. Top with the bacon and hazelnut mix. Add a drizzle of yoghurt to serve.'],nutrition:{perPortion:{calories:116,protein:5,carbs:6,fat:8,fibre:3,salt:0.5},per100g:{calories:82,protein:3.5,carbs:4.2,fat:5.7,fibre:2.1,salt:0.35}}},notes:"Gnocchi is done when they float — don't overcook them. The warm salad is genuinely the star here, don't skip it.",createdAt:'2026-03-07'},

{id:8,emoji:'🍜',name:'Sesame Honey Chicken Noodles',description:'A sticky saucy stir-fry with chicken, colourful veg and egg noodles in a honey sesame glaze',servings:3,prepTime:10,cookTime:20,tags:['chicken','noodles','high protein','quick'],main:{ingredients:[{amount:'½',unit:'tbsp',name:'Sesame oil'},{amount:'300',unit:'g',name:'Diced chicken breast'},{amount:'1',unit:'',name:'Red pepper (diced)'},{amount:'2',unit:'',name:'Spring onions (chopped)'},{amount:'1',unit:'',name:'Carrot (shaved into strips)'},{amount:'2',unit:'cloves',name:'Garlic (crushed)'},{amount:'100',unit:'ml',name:'Chicken stock'},{amount:'1½',unit:'tbsp',name:'Cornflour'},{amount:'2',unit:'tbsp',name:'Honey'},{amount:'3',unit:'tbsp',name:'Soy sauce'},{amount:'100',unit:'g',name:'Peas & sweetcorn (frozen)'},{amount:'150',unit:'g',name:'Dried egg noodles'},{amount:'½',unit:'tbsp',name:'Sesame seeds'}],method:['Heat sesame oil in a wok or large pan. Add chicken and cook for 6–7 minutes until mostly cooked through.','Add pepper, spring onions, carrot and garlic. Cook for another 3–4 minutes until softened.','In a bowl, mix together chicken stock, cornflour, honey and soy sauce. Stir well so no lumps.','Boil noodles according to packet, then drain.','Add peas & sweetcorn and the sauce to the pan. Cook until the sauce thickens and coats everything.','Add cooked noodles and toss everything together. Sprinkle with sesame seeds.'],nutrition:{perPortion:{calories:425,protein:35,carbs:52,fat:7,fibre:4,salt:2.2},per100g:{calories:150,protein:12.4,carbs:18.4,fat:2.5,fibre:1.4,salt:0.78}}},side:null,notes:'Split into 3 portions for a perfect ~425 kcal meal. Drop honey to 1 tbsp and add extra veg to save ~100 kcal without noticing.',createdAt:'2026-03-08'},

{id:9,emoji:'🍝',name:'Spaghetti Bolognese',description:'A proper slow-simmered Bolognese with lean beef, red wine, mushrooms and Worcestershire sauce',servings:6,prepTime:10,cookTime:35,tags:['pasta','beef','batch cook'],main:{ingredients:[{amount:'2',unit:'tbsp',name:'Olive oil'},{amount:'1',unit:'',name:'Onion (finely chopped)'},{amount:'2',unit:'cloves',name:'Garlic (crushed)'},{amount:'450',unit:'g',name:'Extra-lean minced beef'},{amount:'2',unit:'tbsp',name:'Sun-dried tomato paste'},{amount:'300',unit:'ml',name:'Red wine'},{amount:'400',unit:'g',name:'Tinned chopped tomatoes'},{amount:'125',unit:'g',name:'Mushrooms (sliced)'},{amount:'2',unit:'tbsp',name:'Worcestershire sauce'},{amount:'500',unit:'g',name:'Dried spaghetti'},{amount:'50',unit:'g',name:'Parmesan (grated)'}],method:['Heat the olive oil in a large pan. Add onion and cook on medium heat for ~10 minutes until soft and slightly golden. Don\'t rush this — this is where the flavour builds.','Stir in the garlic and cook for 1 minute.','Add the minced beef. Cook until browned, breaking it up as you go so it\'s not clumpy.','Stir in tomato paste and red wine. Bring to the boil briefly. Then add chopped tomatoes, mushrooms, Worcestershire sauce, salt & pepper.','Bring back to the boil, then reduce heat. Simmer gently for ~20 minutes until slightly thickened. Longer = better if you\'ve got time.','Boil salted water and cook spaghetti until al dente (per packet). Drain well.','Add the spaghetti back into the pan or plate separately. Mix with the sauce. Taste and adjust seasoning. Serve with grated Parmesan on top.'],nutrition:{perPortion:{calories:510,protein:30,carbs:67,fat:12,fibre:5,salt:1.5},per100g:{calories:170,protein:10.0,carbs:22.3,fat:4.0,fibre:1.7,salt:0.50}}},side:null,notes:'Core meal for any rotation. Use 350g pasta instead of 500g to cut calories. Easy to accidentally eat 2 portions — portion it out when it\'s hot.',createdAt:'2026-03-09'},

{id:11,emoji:'🍚',name:'Classic Fried Rice',description:'Quick stir-fried rice with scrambled egg, carrot, peas and a soy sesame glaze — a great base or side',servings:4,prepTime:10,cookTime:15,tags:['rice','quick','vegetarian'],main:{ingredients:[{amount:'3',unit:'tbsp',name:'Butter (divided)'},{amount:'2 large',unit:'',name:'Eggs (whisked)'},{amount:'2',unit:'',name:'Carrots (diced)'},{amount:'1 small',unit:'',name:'Onion (diced)'},{amount:'½ cup',unit:'',name:'Frozen peas'},{amount:'3',unit:'cloves',name:'Garlic (minced)'},{amount:'4 cups',unit:'',name:'Cooked chilled rice'},{amount:'3',unit:'',name:'Green onions (sliced)'},{amount:'3–4',unit:'tbsp',name:'Soy sauce'},{amount:'2',unit:'tsp',name:'Oyster sauce (optional)'},{amount:'½',unit:'tsp',name:'Sesame oil'}],method:['Melt a little butter in a large pan. Add the whisked eggs and scramble quickly. Remove and set aside.','Add another bit of butter. Cook onion, carrots and peas until softened (~5 minutes). Add garlic and cook for 1 minute.','Add the cold, cooked rice. Break it up and stir-fry on high heat. Let it fry slightly — get some colour, don\'t just stir constantly.','Stir in soy sauce and oyster sauce (if using). Mix well.','Add the scrambled eggs back in, green onions and sesame oil. Season with salt & pepper.','Serve hot.'],nutrition:{perPortion:{calories:437,protein:10,carbs:68,fat:13,fibre:3,salt:1.9},per100g:{calories:160,protein:3.7,carbs:24.9,fat:4.8,fibre:1.1,salt:0.70}}},side:null,notes:'Cold rice is essential — freshly cooked rice goes mushy. Butter is the main calorie driver; swap 1 tbsp for oil to save ~50 kcal. Easy to bulk up with extra veg.',createdAt:'2026-03-11'},

{id:10,emoji:'🫓',name:'Tomato & Basil Stuffed Flatbreads',description:'Yoghurt-dough flatbreads stuffed with sun-dried tomatoes, fresh basil and three cheeses — perfect for lunch',servings:8,prepTime:20,cookTime:30,tags:['bread','vegetarian','lunch'],main:{ingredients:[{amount:'400',unit:'g',name:'Self-raising flour'},{amount:'340',unit:'g',name:'Greek yoghurt'},{amount:'100',unit:'g',name:'Sun-dried tomatoes (chopped)'},{amount:'50',unit:'g',name:'Fresh basil (chopped)'},{amount:'50',unit:'g',name:'Cream cheese'},{amount:'50',unit:'g',name:'Grated mozzarella'},{amount:'50',unit:'g',name:'Feta (crumbled)'}],method:['In a bowl, mix flour and Greek yoghurt into a dough. If sticky, add a bit more flour. If dry, add a splash of water. Knead lightly until smooth.','Split into 8 equal balls.','Mix together sun-dried tomatoes, basil, cream cheese, mozzarella and feta.','Flatten each dough ball. Add a spoon of filling in the centre. Fold edges over and seal. Gently flatten again into a disc.','Heat a dry pan on medium heat. Cook each flatbread for ~3–4 minutes per side until golden and cooked through.','Eat hot — best fresh.'],nutrition:{perPortion:{calories:260,protein:13,carbs:38,fat:6,fibre:2,salt:0.8},per100g:{calories:218,protein:10.9,carbs:31.9,fat:5.0,fibre:1.7,salt:0.67}}},side:null,notes:'Very easy to eat 2–3 without thinking — 1 flatbread is a portion! Use low-fat cream cheese to save some calories. Great for lunch with a salad.',createdAt:'2026-03-10'}
,{id:12,emoji:'🍗',name:'Stuffed Chicken with Parma Ham',description:'Chicken breast stuffed with cream cheese and herbs, wrapped in Parma ham and baked until golden',servings:2,prepTime:10,cookTime:25,tags:['chicken','high protein','low carb'],main:{ingredients:[{amount:'2 large',unit:'',name:'Chicken breasts'},{amount:'2 slices',unit:'',name:'Parma ham'},{amount:'50',unit:'g',name:'Cream cheese (or ricotta)'},{amount:'handful',unit:'',name:'Fresh basil or spinach'},{amount:'1',unit:'clove',name:'Garlic (minced)'},{amount:'1',unit:'tsp',name:'Olive oil'},{amount:'',unit:'',name:'Salt & pepper'}],method:['Preheat oven to 200°C. Mix cream cheese with garlic and chopped basil or spinach. Season well.','Cut a deep pocket into each chicken breast with a sharp knife — be careful not to cut all the way through.','Stuff each breast generously with the cream cheese mixture. Press the opening closed.','Wrap each stuffed breast tightly in a slice of Parma ham, securing the opening.','Rub with a little olive oil and season. Place in a baking dish.','Bake for 22–25 minutes until the Parma ham is golden and the chicken is cooked through (juices run clear).','Rest for 2 minutes before serving.'],nutrition:{perPortion:{calories:310,protein:34,carbs:3,fat:17,fibre:0,salt:1.1},per100g:{calories:195,protein:21.4,carbs:1.9,fat:10.7,fibre:0,salt:0.69}}},side:null,notes:'Still a solid high-protein meal even with the Parma ham. The cream cheese filling keeps the chicken moist. Log it as roughly 300 kcal. Add cheese sparingly — it stacks quickly with the Parma ham.',createdAt:'2026-03-12'},

// ──────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────
let S = {
  view: 'list',   // list | detail | add | edit
  id: null,       // selected meal id
  tab: 'ingredients', // active tab
  search: '',
  filters: [],
  sort: 'newest',
  cookStep: 0,
  cookSteps: []
};

let meals = [];

function loadMeals() {
  try {
    const saved = localStorage.getItem('mealLibrary');
    meals = saved ? JSON.parse(saved) : DEFAULTS;
    // Migration: fix BBQ pasta (id:3) if it has old incorrect data (was servings:2, 552kcal)
    const bbq = meals.find(m => m.id === 3);
    if (bbq && bbq.servings === 2) {
      bbq.servings = 4;
      bbq.main.nutrition.perPortion = {calories:276,protein:25,carbs:25,fat:8,fibre:3,salt:1.2};
      bbq.main.nutrition.per100g = {calories:105,protein:9.5,carbs:9.5,fat:3.0,fibre:1.1,salt:0.46};
      const si = bbq.main.method.findIndex(s=>s.includes('2 portions'));
      if (si !== -1) bbq.main.method[si] = 'Split into 4 portions and serve.';
      saveMeals();
    }
  } catch(e) { meals = DEFAULTS; }
}

function saveMeals() {
  try { localStorage.setItem('mealLibrary', JSON.stringify(meals)); } catch(e) {}
}

function getMeal(id) { return meals.find(m => m.id === id); }

function calClass(c) {
  if (c < 450) return 'cal-lo';
  if (c < 600) return 'cal-mid';
  return 'cal-hi';
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTotalNut(meal, basis) {
  const m = meal.main.nutrition[basis];
  if (!meal.side) return m;
  const s = meal.side.nutrition[basis];
  return {
    calories: (m.calories||0)+(s.calories||0),
    protein: (m.protein||0)+(s.protein||0),
    carbs: (m.carbs||0)+(s.carbs||0),
    fat: (m.fat||0)+(s.fat||0),
    fibre: (m.fibre||0)+(s.fibre||0),
    salt: (m.salt||0)+(s.salt||0)
  };
}

function getAllTags() {
  const set = new Set();
  meals.forEach(m => m.tags.forEach(t => set.add(t)));
  return Array.from(set).sort();
}

function getFiltered() {
  let ms = [...meals];
  if (S.search) {
    const q = S.search.toLowerCase();
    ms = ms.filter(m =>
      m.name.toLowerCase().includes(q) ||
      (m.description||'').toLowerCase().includes(q) ||
      m.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  if (S.filters.length) ms = ms.filter(m => S.filters.every(f => m.tags.includes(f)));
  if (S.sort === 'newest') ms.sort((a,b) => b.id - a.id);
  else if (S.sort === 'oldest') ms.sort((a,b) => a.id - b.id);
  else if (S.sort === 'cal-asc') ms.sort((a,b) => a.main.nutrition.perPortion.calories - b.main.nutrition.perPortion.calories);
  else if (S.sort === 'cal-desc') ms.sort((a,b) => b.main.nutrition.perPortion.calories - a.main.nutrition.perPortion.calories);
  else if (S.sort === 'az') ms.sort((a,b) => a.name.localeCompare(b.name));
  return ms;
}

// ──────────────────────────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (S.view === 'list') app.innerHTML = renderList();
  else if (S.view === 'detail') app.innerHTML = renderDetail();
  else app.innerHTML = renderForm();
  window.scrollTo(0,0);
}

// ── LIST VIEW ──────────────────────────────────────────────────
function renderList() {
  const ms = getFiltered();
  const allTags = getAllTags();
  const chips = allTags.map(t =>
    `<button class="chip${S.filters.includes(t)?' on':''}" data-action="filter-tag" data-tag="${escH(t)}">${escH(t)}</button>`
  ).join('');

  const cards = ms.length ? ms.map(m => {
    const cal = m.main.nutrition.perPortion.calories;
    const total = getTotalNut(m, 'perPortion');
    const hasSide = !!m.side;
    return `<div class="card" data-action="go-detail" data-id="${m.id}">
      <div class="card-head">
        <div class="card-emj">${m.emoji||'🍽️'}</div>
        <div class="card-tw">
          <div class="card-title">${escH(m.name)}</div>
          <div class="card-desc">${escH(m.description||'')}</div>
        </div>
        <div class="cal-badge ${calClass(total.calories)}" style="text-align:center">${total.calories} kcal<span style="display:block;font-size:9.5px;font-weight:400;opacity:.72;margin-top:1px;letter-spacing:.2px">per portion</span></div>
      </div>
      <div class="card-meta">
        <span class="mi">👤 <span>${m.servings} servings</span></span>
        <span class="mi">⏱ <span>${(m.prepTime||0)+(m.cookTime||0)} mins</span></span>
        ${hasSide ? `<span class="mi">🥗 <span style="color:var(--blue)">+side</span></span>` : ''}
      </div>
      <div class="tags">
        ${m.tags.map(t=>`<span class="tag">${escH(t)}</span>`).join('')}
        ${hasSide ? `<span class="tag tag-s">with side</span>` : ''}
        ${m.sideOnly ? `<span class="tag tag-so">side dish only</span>` : ''}
      </div>
    </div>`;
  }).join('') : `<div class="empty" style="grid-column:1/-1">
    <div class="empty-ico">🔍</div>
    <div class="empty-t">No meals found</div>
    <div style="font-size:13px;color:var(--faint)">Try a different search or clear your filters</div>
  </div>`;

  return `
  <div class="topbar">
    <div class="logo" data-action="go-list"><em>Meal</em> Library</div>
    <button class="btn btn-p" data-action="go-add">＋ Add Meal</button>
  </div>
  <div class="search-row">
    <div class="sw">
      <span class="si">🔍</span>
      <input class="search" type="text" placeholder="Search meals, ingredients, tags…" value="${escH(S.search)}" oninput="S.search=this.value;render()">
    </div>
    <select class="sort" onchange="S.sort=this.value;render()">
      <option value="newest"${S.sort==='newest'?' selected':''}>Newest</option>
      <option value="oldest"${S.sort==='oldest'?' selected':''}>Oldest</option>
      <option value="az"${S.sort==='az'?' selected':''}>A → Z</option>
      <option value="cal-asc"${S.sort==='cal-asc'?' selected':''}>Cal ↑</option>
      <option value="cal-desc"${S.sort==='cal-desc'?' selected':''}>Cal ↓</option>
    </select>
  </div>
  ${allTags.length ? `<div class="filters">
    <button class="chip${!S.filters.length?' on':''}" data-action="filter-all">All</button>
    ${chips}
  </div>` : ''}
  <button class="dinner-btn" data-action="random-meal">
    🎲 What shall I have for dinner?
    <span class="sub">Pick one at random from your library</span>
  </button>
  <div class="count">${ms.length} meal${ms.length!==1?'s':''}</div>
  <div class="grid">${cards}</div>`;
}

// ── DETAIL VIEW ────────────────────────────────────────────────
function renderDetail() {
  const meal = getMeal(S.id);
  if (!meal) return renderList();

  const mnp = meal.main.nutrition.perPortion;
  const mn1 = meal.main.nutrition.per100g;
  const tot = getTotalNut(meal, 'perPortion');
  const tot1 = getTotalNut(meal, 'per100g');
  const snp = meal.side ? meal.side.nutrition.perPortion : null;
  const sn1 = meal.side ? meal.side.nutrition.per100g : null;

  // Nutrition strip
  const strip = `<div class="nstrip">
    <div class="nsc">
      <div class="nsc-l">Main</div>
      <div class="nsc-cal">${mnp.calories}<sub> kcal</sub></div>
      <div class="nsc-m"><span class="mp">P ${mnp.protein}g</span><span class="mc">C ${mnp.carbs}g</span><span class="mf">F ${mnp.fat}g</span></div>
    </div>
    <div class="nsc">
      <div class="nsc-l">Side</div>
      ${meal.side ? `<div class="nsc-cal">${snp.calories}<sub> kcal</sub></div>
      <div class="nsc-m"><span class="mp">P ${snp.protein}g</span><span class="mc">C ${snp.carbs}g</span><span class="mf">F ${snp.fat}g</span></div>`
      : `<div class="nsc-cal" style="font-size:16px;color:var(--faint)">—</div><div class="nsc-m" style="color:var(--faint)">no side dish</div>`}
    </div>
    <div class="nsc nsc-tot">
      <div class="nsc-l">Total</div>
      <div class="nsc-cal">${tot.calories}<sub> kcal</sub></div>
      <div class="nsc-m"><span class="mp">P ${tot.protein}g</span><span class="mc">C ${tot.carbs}g</span><span class="mf">F ${tot.fat}g</span></div>
    </div>
  </div>`;

  // Ingredients tab
  function ingList(ings, title) {
    if (!ings || !ings.length) return '';
    return `<div class="sec-title">${title}</div>
    <ul class="ings">${ings.map(i => `<li class="ir">
      <span class="iamt">${escH(i.amount)}</span>
      <span class="iunit">${escH(i.unit)}</span>
      <span class="iname">${escH(i.name)}</span>
      ${i.note ? `<span class="inote">${escH(i.note)}</span>` : ''}
    </li>`).join('')}</ul>`;
  }

  const ingTab = `<div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn btn-g btn-sm" onclick="copyIngredients()" id="copy-ing-btn">📋 Copy shopping list</button>
  </div>`
  + ingList(meal.main.ingredients, meal.side ? '🍳 Main' : '🍳 Ingredients')
    + (meal.side ? ingList(meal.side.ingredients, `🥗 ${escH(meal.side.name||'Side')}`) : '');

  // Method tab
  function methodList(steps, title) {
    if (!steps || !steps.length) return '';
    return `<div class="sec-title">${title}</div>
    <ol class="steps">${steps.map((s,i) => `<li class="step">
      <div class="sn">${i+1}</div>
      <div class="st">${escH(s)}</div>
    </li>`).join('')}</ol>`;
  }

  const methTab = methodList(meal.main.method, meal.side ? '🍳 Main' : '📋 Method')
    + (meal.side ? methodList(meal.side.method, `🥗 ${escH(meal.side.name||'Side')}`) : '');

  // Nutrition tab
  function nutTable(n, n1, label) {
    if (!n) return '';
    return `<div class="nt"><div class="nth">${label}</div>
    <table class="ntab">
      <thead><tr><th>Nutrient</th><th>Per Portion</th><th>Per 100g</th></tr></thead>
      <tbody>
        <tr class="hl"><td>Calories</td><td>${n.calories} kcal</td><td>${n1.calories} kcal</td></tr>
        <tr><td>Protein</td><td>${n.protein}g</td><td>${n1.protein}g</td></tr>
        <tr><td>Carbohydrates</td><td>${n.carbs}g</td><td>${n1.carbs}g</td></tr>
        <tr><td>Fat</td><td>${n.fat}g</td><td>${n1.fat}g</td></tr>
        <tr><td>Fibre</td><td>${n.fibre}g</td><td>${n1.fibre}g</td></tr>
        <tr><td>Salt</td><td>${n.salt}g</td><td>${n1.salt}g</td></tr>
      </tbody>
    </table></div>`;
  }

  const nutTab = nutTable(mnp, mn1, `🍳 ${meal.side ? 'Main Meal' : 'Nutrition'}`)
    + (meal.side ? nutTable(snp, sn1, `🥗 ${escH(meal.side.name||'Side')}`) : '')
    + (meal.side ? nutTable(tot, tot1, '⚡ Combined Total') : '');

  const tabs = ['ingredients','method','nutrition','notes'];
  const tabLabels = {ingredients:'🧺 Ingredients', method:'📋 Method', nutrition:'📊 Nutrition', notes:'📝 Notes'};
  const tabContent = {ingredients: ingTab, method: methTab, nutrition: nutTab,
    notes: meal.notes ? `<div class="notes-box">${escH(meal.notes)}</div>` : `<div style="color:var(--faint);font-size:13.5px">No notes added.</div>`
  };

  return `
  <div class="topbar">
    <div class="logo" data-action="go-list"><em>Meal</em> Library</div>
    <button class="btn btn-g btn-sm" data-action="go-list">← All meals</button>
  </div>
  <div class="anim">
  <div class="dh">
    <div class="d-emj">${meal.emoji||'🍽️'}</div>
    <div class="d-ta">
      <div class="d-title">${escH(meal.name)}</div>
      <div class="d-desc">${escH(meal.description||'')}</div>
      <div class="d-meta">
        <span class="d-mi">👤 <strong>${meal.servings}</strong> servings</span>
        <span class="d-mi">⏳ Prep <strong>${meal.prepTime||0} min</strong></span>
        <span class="d-mi">🔥 Cook <strong>${meal.cookTime||0} min</strong></span>

  </div>
  <div class="d-acts">
    <button class="btn btn-p btn-sm" data-action="start-cooking">▶ Cook</button>
    <button class="btn btn-g btn-sm" data-action="go-edit" data-id="${meal.id}">✏️ Edit</button>
    <button class="btn btn-g btn-sm" data-action="duplicate-meal" data-id="${meal.id}">⧉ Duplicate</button>
    <button class="btn btn-d btn-sm" data-action="delete-meal" data-id="${meal.id}">🗑 Delete</button>
  </div>
  ${strip}
  <div class="tabs">
    ${tabs.map(t => `<button class="tab${S.tab===t?' on':''}" data-action="tab-switch" data-tab="${t}">${tabLabels[t]}</button>`).join('')}
  </div>
  ${tabs.map(t => `<div class="tp${S.tab===t?' on':''}">${tabContent[t]||''}</div>`).join('')}
  </div>`;
}

// ── FORM VIEW ──────────────────────────────────────────────────

  const hasSide = !!m.side;

    <div class="srep" id="main-step-rep">${stepRows(m.main.method, 'main')}</div>
    <button class="add-row" data-action="add-main-step" type="button">＋ Add step</button>
  </div></div>

  <div class="fs"><div class="fsh">📊 Main Nutrition</div><div class="fb">${nutInputs(m.main.nutrition.perPortion, m.main.nutrition.per100g, 'main')}</div></div>

  <div class="side-tog" onclick="toggleSide()" style="margin-bottom:20px">
    <div class="tog${hasSide?' on':''}" id="side-tog"></div>
    <span>This meal has a <strong>side dish</strong></span>
  </div>

  <div id="side-section" style="display:${hasSide?'block':'none'}">
    <div class="fs"><div class="fsh">🥗 Side Name</div><div class="fb">
      <div class="fg"><label class="fl">Side Dish Name</label><input class="fi" id="f-side-name" placeholder="e.g. Garden Salad" value="${escH(s.name||'')}"></div>
    </div></div>
    <div class="fs"><div class="fsh">🥗 Side Ingredients</div><div class="fb">
      <div class="rep" id="side-ing-rep">${ingRows(s.ingredients, 'side')}</div>
      <button class="add-row" data-action="add-side-ing" type="button">＋ Add ingredient</button>
    </div></div>
    <div class="fs"><div class="fsh">🥗 Side Method</div><div class="fb">
      <div class="srep" id="side-step-rep">${stepRows(s.method, 'side')}</div>
      <button class="add-row" data-action="add-side-step" type="button">＋ Add step</button>
    </div></div>
    <div class="fs"><div class="fsh">📊 Side Nutrition</div><div class="fb">${nutInputs(s.nutrition.perPortion, s.nutrition.per100g, 'side')}</div></div>
  </div>

  <div class="fs"><div class="fsh">📝 Notes</div><div class="fb">
    <textarea class="fi" id="f-notes" rows="4" placeholder="Substitutions, batch cook tips, freezer notes, kid-friendly tweaks…">${escH(m.notes||'')}</textarea>
  </div></div>

  <div style="display:flex;gap:10px;margin-top:6px">
    <button class="btn btn-p" data-action="save-meal" style="flex:1">💾 Save Meal</button>
    <button class="btn btn-g" data-action="go-back-form">Cancel</button>
  </div>
  </div>`;
}

// ──────────────────────────────────────────────────────────────
// EVENT HANDLERS
// ──────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id ? parseInt(el.dataset.id) : null;
  const tag = el.dataset.tag;
  const tab = el.dataset.tab;

  switch(action) {
    case 'go-detail':
      S.view = 'detail'; S.id = id; S.tab = 'ingredients'; render(); break;
    case 'go-list':
      S.view = 'list'; render(); break;
    case 'go-add':
      S.view = 'add'; S.id = null; render(); break;
    case 'go-edit':
      S.view = 'edit'; S.id = id; render(); break;
    case 'go-back-form':
      if (S.id) { S.view = 'detail'; } else { S.view = 'list'; } render(); break;
    case 'tab-switch':
      S.tab = tab; render(); break;
    case 'filter-tag':
      if (S.filters.includes(tag)) S.filters = S.filters.filter(f=>f!==tag);
      else S.filters.push(tag);
      render(); break;
    case 'filter-all':
      S.filters = []; render(); break;
    case 'delete-meal':
      showDeleteModal(id); break;
    case 'confirm-delete':
      meals = meals.filter(m=>m.id!==id); saveMeals(); hideModal(); S.view='list'; render(); break;
    case 'cancel-delete':
      hideModal(); break;
    case 'random-meal':
      pickRandomMeal(); break;
    case 'save-meal':
      saveMealForm(); break;
    case 'duplicate-meal':
      duplicateMeal(id); break;
    case 'start-cooking':
      startCooking(); break;
    case 'add-main-ing': addIngRow('main'); break;
    case 'remove-main-ing': removeRow(el,'main','ing'); break;
    case 'add-main-step': addStepRow('main'); break;
    case 'remove-main-step': removeRow(el,'main','step'); break;
    case 'add-side-ing': addIngRow('side'); break;
    case 'remove-side-ing': removeRow(el,'side','ing'); break;
    case 'add-side-step': addStepRow('side'); break;
    case 'remove-side-step': removeRow(el,'side','step'); break;
  }
});

// ── REPEATER HELPERS ──────────────────────────────────────────
function addIngRow(section) {
  const rep = document.getElementById(`${section}-ing-rep`);
  if (!rep) return;
  const idx = rep.querySelectorAll('.ing-row').length;
  const div = document.createElement('div');
  div.className = `rr ${section}-ing-row ing-row`;
  div.dataset.idx = idx;
  div.innerHTML = `<input class="fi amt" data-field="ing-amount" placeholder="Amt" value="">
    <input class="fi unt" data-field="ing-unit" placeholder="Unit" value="">
    <input class="fi" data-field="ing-name" placeholder="Ingredient name *" value="">
    <button class="rmv" data-action="remove-${section}-ing" type="button" title="Remove">×</button>`;
  rep.appendChild(div);
  div.querySelector('[data-field="ing-name"]').focus();
}

function addStepRow(section) {
  const rep = document.getElementById(`${section}-step-rep`);
  if (!rep) return;
  const idx = rep.querySelectorAll('.step-row').length;
  const div = document.createElement('div');
  div.className = `srr ${section}-step-row step-row`;
  div.dataset.idx = idx;
  div.innerHTML = `<div class="snbadge">${idx+1}</div>
    <textarea class="fi" rows="2" placeholder="Step instructions…"></textarea>
    <button class="rmv" data-action="remove-${section}-step" type="button" title="Remove">×</button>`;
  rep.appendChild(div);
  div.querySelector('textarea').focus();
}

function removeRow(btn, section, type) {
  const row = btn.closest(`.${section}-${type}-row`);
  if (row) row.remove();
  if (type === 'step') renumberSteps(section);
}

function renumberSteps(section) {
  document.querySelectorAll(`.${section}-step-row`).forEach((r,i) => {
    const b = r.querySelector('.snbadge');
    if (b) b.textContent = i+1;
  });
}

// ── FORM SAVE ─────────────────────────────────────────────────
function readIngredients(section) {
  return Array.from(document.querySelectorAll(`.${section}-ing-row`)).map(row => ({
    amount: row.querySelector('[data-field="ing-amount"]')?.value.trim()||'',
    unit: row.querySelector('[data-field="ing-unit"]')?.value.trim()||'',
    name: row.querySelector('[data-field="ing-name"]')?.value.trim()||''
  })).filter(i=>i.name);
}

function readMethod(section) {
  return Array.from(document.querySelectorAll(`.${section}-step-row textarea`))
    .map(ta=>ta.value.trim()).filter(Boolean);
}

function readNut(prefix) {
  const f = k => parseFloat(document.querySelector(`[data-nut="${prefix}-pp-${k}"]`)?.value)||0;
  const g = k => parseFloat(document.querySelector(`[data-nut="${prefix}-100-${k}"]`)?.value)||0;
  return {
    perPortion:{calories:f('cal'),protein:f('pro'),carbs:f('car'),fat:f('fat'),fibre:f('fib'),salt:f('sal')},
    per100g:{calories:g('cal'),protein:g('pro'),carbs:g('car'),fat:g('fat'),fibre:g('fib'),salt:g('sal')}
  };
}

function saveMealForm() {
  const name = document.getElementById('f-name')?.value.trim();
  if (!name) { alert('Please enter a meal name.'); return; }

  const hasSide = document.getElementById('side-tog')?.classList.contains('on');
  const sideIngs = hasSide ? readIngredients('side') : [];
  const sideMeth = hasSide ? readMethod('side') : [];
  const sideName = hasSide ? (document.getElementById('f-side-name')?.value.trim()||'Side') : '';

  const tags = (document.getElementById('f-tags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);

  const data = {
    name,
    emoji: document.getElementById('f-emoji')?.value.trim()||'🍽️',
    description: document.getElementById('f-desc')?.value.trim()||'',
    servings: parseInt(document.getElementById('f-servings')?.value)||4,
    prepTime: parseInt(document.getElementById('f-prep')?.value)||0,
    cookTime: parseInt(document.getElementById('f-cook')?.value)||0,
    tags,
    main: { ingredients: readIngredients('main'), method: readMethod('main'), nutrition: readNut('main') },
    side: hasSide ? { name: sideName, ingredients: sideIngs, method: sideMeth, nutrition: readNut('side') } : null,
    notes: document.getElementById('f-notes')?.value.trim()||''
  };

  if (S.view === 'edit' && S.id) {
    const idx = meals.findIndex(m=>m.id===S.id);
    if (idx !== -1) { meals[idx] = { ...meals[idx], ...data, updatedAt: new Date().toISOString() }; }
    saveMeals(); S.view='detail'; render();
  } else {
    const newId = meals.length ? Math.max(...meals.map(m=>m.id))+1 : 1;
    const newMeal = { id: newId, createdAt: new Date().toISOString().split('T')[0], ...data };
    meals.push(newMeal); saveMeals(); S.view='detail'; S.id=newId; render();
  }
}

// ── DUPLICATE & DELETE ────────────────────────────────────────
function duplicateMeal(id) {
  const meal = getMeal(id);
  if (!meal) return;
  const newId = Math.max(...meals.map(m=>m.id))+1;
  const copy = JSON.parse(JSON.stringify(meal));
  copy.id = newId; copy.name = copy.name + ' (copy)'; copy.createdAt = new Date().toISOString().split('T')[0];
  meals.push(copy); saveMeals(); S.view='detail'; S.id=newId; render();
}

function showDeleteModal(id) {
  const meal = getMeal(id);
  if (!meal) return;
  document.getElementById('modal').style.display='flex';
  document.getElementById('modal').innerHTML = `<div class="modal-box">
    <div class="modal-title">Delete meal?</div>
    <div class="modal-text">Are you sure you want to delete <strong>${escH(meal.name)}</strong>? This can't be undone.</div>
    <div class="modal-acts">
      <button class="btn btn-g btn-sm" data-action="cancel-delete">Cancel</button>
      <button class="btn btn-d btn-sm" data-action="confirm-delete" data-id="${id}">Delete</button>
    </div>
  </div>`;
}

function hideModal() {
  document.getElementById('modal').style.display='none';
}

// ── TOGGLE SIDE ────────────────────────────────────────────────
function toggleSide() {
  const tog = document.getElementById('side-tog');
  const sec = document.getElementById('side-section');
  if (!tog || !sec) return;
  tog.classList.toggle('on');
  sec.style.display = tog.classList.contains('on') ? 'block' : 'none';
}

// ── COOKING MODE ───────────────────────────────────────────────
function startCooking() {
  const meal = getMeal(S.id);
  if (!meal) return;
  S.cookSteps = [...(meal.main.method||[])];
  if (meal.side && meal.side.method) S.cookSteps.push(...meal.side.method);
  if (!S.cookSteps.length) return;
  S.cookStep = 0;
  updateCookOverlay();
  const overlay = document.getElementById('cook-overlay');
  const inner = document.getElementById('cook-inner');
  overlay.classList.add('vis');
  setTimeout(()=>inner.classList.add('vis'), 50);
  document.body.style.overflow='hidden';
}

function updateCookOverlay() {
  const lbl = document.getElementById('cook-lbl');
  const text = document.getElementById('cook-text');
  const prog = document.getElementById('cook-prog');
  const meal = getMeal(S.id);
  if (lbl) lbl.textContent = `Step ${S.cookStep+1} of ${S.cookSteps.length}${meal?' — '+meal.name:''}`;
  if (text) text.textContent = S.cookSteps[S.cookStep]||'';
  if (prog) {
    const pct = Math.round(((S.cookStep+1)/S.cookSteps.length)*100);
    prog.textContent = `${pct}% complete`;
  }
}

function cookNext() {
  if (S.cookStep < S.cookSteps.length-1) { S.cookStep++; updateCookOverlay(); }
  else stopCooking();
}

function cookPrev() {
  if (S.cookStep > 0) { S.cookStep--; updateCookOverlay(); }
}

function stopCooking() {
  const overlay = document.getElementById('cook-overlay');
  const inner = document.getElementById('cook-inner');
  overlay.classList.remove('vis');
  inner.classList.remove('vis');
  document.body.style.overflow='';
}

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('cook-overlay')?.classList.contains('vis')) {
    if (e.key==='ArrowRight'||e.key==='ArrowDown') cookNext();
    if (e.key==='ArrowLeft'||e.key==='ArrowUp') cookPrev();
    if (e.key==='Escape') stopCooking();
  }
  if (e.key==='Escape' && document.getElementById('modal')?.style.display!=='none') hideModal();
});

// ── RANDOM MEAL PICKER ────────────────────────────────────────
let pickedId = null;

function pickRandomMeal() {
  if (!meals.length) return;
  const pool = meals.filter(m => !m.sideOnly);
  const meal = pool[Math.floor(Math.random() * pool.length)];
  pickedId = meal.id;
  showPicker(meal);
}

function pickAnother() {
  const pool = meals.filter(m => !m.sideOnly && m.id !== pickedId);
  if (!pool.length) return;
  const meal = pool[Math.floor(Math.random() * pool.length)];
  pickedId = meal.id;
  // Reset emoji animation
  const emj = document.getElementById('pk-emj');
  emj.style.animation = 'none';
  emj.offsetHeight; // reflow
  emj.style.animation = '';
  showPicker(meal);
}

function showPicker(meal) {
  const tot = getTotalNut(meal, 'perPortion');
  const cc = calClass(tot.calories);
  const colors = {'cal-lo':'var(--green)','cal-mid':'var(--accent)','cal-hi':'var(--red)'};
  const bgs = {'cal-lo':'var(--green-d)','cal-mid':'var(--accent-d)','cal-hi':'var(--red-d)'};
  document.getElementById('pk-emj').textContent = meal.emoji || '🍽️';
  document.getElementById('pk-title').textContent = meal.name;
  document.getElementById('pk-desc').textContent = meal.description || '';
  const calEl = document.getElementById('pk-cal');
  calEl.textContent = tot.calories + ' kcal per portion';
  calEl.style.background = bgs[cc]; calEl.style.color = colors[cc];
  document.getElementById('pk-tags').innerHTML = meal.tags.map(t=>`<span class="tag">${escH(t)}</span>`).join('');
  document.getElementById('picker-overlay').classList.add('vis');
  document.body.style.overflow = 'hidden';
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('vis');
  document.body.style.overflow = '';
}

function goPickedMeal() {
  closePicker();
  S.view = 'detail'; S.id = pickedId; S.tab = 'ingredients'; render();
}

// ── COPY INGREDIENTS ──────────────────────────────────────────
function copyIngredients() {
  const meal = getMeal(S.id);
  if (!meal) return;
  let lines = ['\uD83D\uDED2 ' + meal.name + ' (serves ' + meal.servings + ')', ''];
  const fmt = (ings, label) => {
    if (!ings || !ings.length) return;
    if (label) lines.push(label);
    ings.forEach(i => {
      const parts = [i.amount, i.unit, i.name].filter(Boolean).join(' ');
      lines.push('\u2022 ' + parts);
    });
  };
  fmt(meal.main.ingredients, meal.side ? '\u2014 Main \u2014' : null);
  if (meal.side) fmt(meal.side.ingredients, '\n\u2014 ' + (meal.side.name||'Side') + ' \u2014');
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copy-ing-btn');
    if (btn) { btn.textContent = '\u2705 Copied!'; setTimeout(()=>{ btn.innerHTML='\uD83D\uDCCB Copy shopping list'; }, 2200); }
  }).catch(() => alert('Copy failed \u2014 try selecting manually.'));
}

// ── INIT ───────────────────────────────────────────────────────
loadMeals();
render();
</script>
